name: Prepare Android Project

on:
  workflow_call:

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Add Android Platform and Sync
        run: |
          npx cap add android
          npx cap sync android

      - name: Upload Android Project Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-project
          path: android
